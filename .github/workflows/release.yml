name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  CLIPROXYAPI_CHANNEL: mainline
  CLIPROXYAPI_VERSION: "7.2.61"

jobs:
  release:
    name: Release (${{ matrix.os }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2 rpm

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install

      - name: Download CLIProxyAPI sidecar binary
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -e
          mkdir -p src-tauri/binaries

          case "${{ matrix.target }}" in
            aarch64-apple-darwin)
              BINARY="cli-proxy-api-aarch64-apple-darwin"
              ;;
            x86_64-apple-darwin)
              BINARY="cli-proxy-api-x86_64-apple-darwin"
              ;;
            x86_64-unknown-linux-gnu)
              BINARY="cli-proxy-api-x86_64-unknown-linux-gnu"
              ;;
            x86_64-pc-windows-msvc)
              BINARY="cli-proxy-api-x86_64-pc-windows-msvc.exe"
              ;;
            *)
              echo "Unknown target: ${{ matrix.target }}"
              exit 1
              ;;
          esac

          echo "Downloading CLIProxyAPI sidecar channel '$CLIPROXYAPI_CHANNEL' for ${{ matrix.target }}..."
          node scripts/update-sidecar.mjs --channel "$CLIPROXYAPI_CHANNEL" --force "$BINARY"

          echo "Downloaded:"
          ls -la "$GITHUB_WORKSPACE/src-tauri/binaries/"

      - name: Verify sidecar binary (smoke test)
        shell: bash
        run: |
          set -e
          case "${{ matrix.target }}" in
            x86_64-pc-windows-msvc)
              BINARY="src-tauri/binaries/cli-proxy-api-x86_64-pc-windows-msvc.exe"
              ;;
            aarch64-apple-darwin)
              BINARY="src-tauri/binaries/cli-proxy-api-aarch64-apple-darwin"
              ;;
            x86_64-apple-darwin)
              BINARY="src-tauri/binaries/cli-proxy-api-x86_64-apple-darwin"
              ;;
            x86_64-unknown-linux-gnu)
              BINARY="src-tauri/binaries/cli-proxy-api-x86_64-unknown-linux-gnu"
              ;;
            *)
              echo "Unknown target: ${{ matrix.target }}"
              exit 1
              ;;
          esac
          node scripts/sidecar-smoke.mjs --binary "$BINARY"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPIMAGELAUNCHER_DISABLE: 1
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          ANTIGRAVITY_CLIENT_ID: ${{ secrets.ANTIGRAVITY_CLIENT_ID }}
          ANTIGRAVITY_CLIENT_SECRET: ${{ secrets.ANTIGRAVITY_CLIENT_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ProxyPal ${{ github.ref_name }}"
          releaseBody: |
            ## What's New

            See the [commits](${{ github.server_url }}/${{ github.repository }}/commits/${{ github.ref_name }}) for details.

            ## Downloads

            | Platform | Download |
            |----------|----------|
            | macOS (Apple Silicon) | Unsigned, not notarized `.dmg` (aarch64) |
            | macOS (Intel) | Unsigned, not notarized `.dmg` (x64) |
            | Windows | `.exe` installer |
            | Windows (Portable) | `.zip` (no install required) |
            | Linux | `.deb` package |
            | Linux (Fedora/RHEL) | `.rpm` package |
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: --target ${{ matrix.target }}

      - name: Create portable Windows zip
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.ref_name }}"
          $exePath = "src-tauri/target/x86_64-pc-windows-msvc/release/ProxyPal.exe"

          if (Test-Path $exePath) {
            $zipName = "ProxyPal_${version}_x64_portable.zip"
            Compress-Archive -Path $exePath -DestinationPath $zipName
            gh release upload $version $zipName --clobber
            Write-Host "Uploaded portable zip: $zipName"
          } else {
            Write-Warning "Executable not found at $exePath"
            Get-ChildItem -Recurse -Filter "*.exe" src-tauri/target | Select-Object FullName
          }

  generate-changelog:
    name: Generate Changelog
    needs: release
    runs-on: ubuntu-latest
    if: always() && !cancelled()
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
      sidecar_version: ${{ steps.changelog.outputs.sidecar_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog from commits and CLIProxyAPI
        id: changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e

          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          CURRENT_TAG="${{ github.ref_name }}"

          echo "Previous tag: $PREV_TAG"
          echo "Current tag: $CURRENT_TAG"

          # Generate ProxyPal commits changelog
          PROXYPAL_CHANGES=""
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline "$PREV_TAG..$CURRENT_TAG" --pretty=format:"- %s" 2>/dev/null || echo "")
            if [ -n "$COMMITS" ]; then
              PROXYPAL_CHANGES="$COMMITS"
            fi
          fi

          # Get CLIProxyAPI latest release info for the selected sidecar channel
          SIDECAR_REPO="router-for-me/CLIProxyAPI"
          if [ "$CLIPROXYAPI_CHANNEL" = "plus" ]; then
            SIDECAR_REPO="router-for-me/CLIProxyAPIPlus"
          fi
          SIDECAR_RELEASE=$(gh release view --repo "$SIDECAR_REPO" --json tagName,body 2>/dev/null || echo "{}")
          SIDECAR_VERSION=$(echo "$SIDECAR_RELEASE" | jq -r '.tagName // "unknown"')
          SIDECAR_BODY=$(echo "$SIDECAR_RELEASE" | jq -r '.body // ""')

          echo "sidecar_version=$SIDECAR_VERSION" >> $GITHUB_OUTPUT

          # Extract key fixes/features from the selected CLIProxyAPI changelog (filter out merge commits)
          SIDECAR_HIGHLIGHTS=""
          if [ -n "$SIDECAR_BODY" ]; then
            # Extract lines with fix/feat/Fixed and format them
            SIDECAR_HIGHLIGHTS=$(echo "$SIDECAR_BODY" | grep -E '(fix|feat|Fixed|refactor)\(' | head -10 | sed 's/^- \[.*\] /- /' | sed 's/^/- /' || echo "")
          fi

          # Build full changelog
          CHANGELOG="### ProxyPal Changes"
          if [ -n "$PROXYPAL_CHANGES" ]; then
            CHANGELOG="$CHANGELOG
          $PROXYPAL_CHANGES"
          else
            CHANGELOG="$CHANGELOG
          - Release $CURRENT_TAG"
          fi

          CHANGELOG="$CHANGELOG

          ### Sidecar: CLIProxyAPI ($CLIPROXYAPI_CHANNEL) $SIDECAR_VERSION"

          if [ -n "$SIDECAR_HIGHLIGHTS" ]; then
            CHANGELOG="$CHANGELOG
          $SIDECAR_HIGHLIGHTS"
          fi

          # Escape for GitHub output
          CHANGELOG="${CHANGELOG//'%'/'%25'}"
          CHANGELOG="${CHANGELOG//$'\n'/'%0A'}"
          CHANGELOG="${CHANGELOG//$'\r'/'%0D'}"

          echo "changelog=$CHANGELOG" >> $GITHUB_OUTPUT

      - name: Update release body with changelog
        env:
          GH_TOKEN: ${{ github.token }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
          SIDECAR_VERSION: ${{ steps.changelog.outputs.sidecar_version }}
        run: |
          # Decode the changelog (it was percent-encoded)
          DECODED_CHANGELOG=$(echo "$CHANGELOG" | sed 's/%0A/\n/g' | sed 's/%0D//g' | sed 's/%25/%/g')

          # Build release body using printf to avoid HEREDOC issues
          {
            echo "## What's New"
            echo ""
            echo "$DECODED_CHANGELOG"
            echo ""
            echo "## Downloads"
            echo ""
            echo "| Platform | Download |"
            echo "|----------|----------|"
            echo "| macOS (Apple Silicon) | Unsigned, not notarized \`.dmg\` (aarch64) |"
            echo "| macOS (Intel) | Unsigned, not notarized \`.dmg\` (x64) |"
            echo "| Windows | \`.exe\` installer |"
            echo "| Windows (Portable) | \`.zip\` (no install required) |"
            echo "| Linux | \`.deb\` package |"
            echo "| Linux (Fedora/RHEL) | \`.rpm\` package |"
            echo ""
            echo "---"
            echo "*Bundled sidecar: CLIProxyAPI (${{ env.CLIPROXYAPI_CHANNEL }}) $SIDECAR_VERSION*"
          } > /tmp/release_body.md

          echo "=== Release body ==="
          cat /tmp/release_body.md
          echo "===================="

          # Update release with new body
          gh release edit "${{ github.ref_name }}" --notes-file /tmp/release_body.md || true

  notify:
    name: Discord Notification
    needs: [release, generate-changelog]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Discord notification (release)
        if: ${{ needs.release.result == 'success' }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fetch the release body (which now contains the changelog)
          RELEASE_BODY=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}" \
            | jq -r '.body // "New version available"')

          # Truncate if too long for Discord (max 4096 chars for embed description)
          if [ ${#RELEASE_BODY} -gt 3800 ]; then
            RELEASE_BODY="${RELEASE_BODY:0:3800}...\n\n[See full changelog](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }})"
          fi

          # Escape for JSON
          RELEASE_BODY=$(echo "$RELEASE_BODY" | jq -Rs .)

          # Send Discord notification with changelog
          curl -H "Content-Type: application/json" \
            -d "{\"embeds\": [{\"title\": \"🚀 ProxyPal ${{ github.ref_name }} Released!\", \"description\": $RELEASE_BODY, \"color\": 5793266, \"url\": \"${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}\"}]}" \
            $DISCORD_WEBHOOK

      - name: Discord notification (failure)
        if: ${{ needs.release.result == 'failure' }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -H "Content-Type: application/json" \
            -d "{\"embeds\": [{\"title\": \"❌ ProxyPal Release Failed\", \"description\": \"**Tag:** \`${{ github.ref_name }}\`\n\n[View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"color\": 15158332}]}" \
            $DISCORD_WEBHOOK
