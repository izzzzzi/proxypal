name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      sidecar_channel:
        description: "Sidecar release channel to bundle (mainline is CI-safe; Plus may be unavailable)"
        required: true
        default: "mainline"
        type: choice
        options:
          - plus
          - mainline

env:
  CARGO_TERM_COLOR: always
  CLIPROXYAPI_CHANNEL: ${{ github.event.inputs.sidecar_channel || 'mainline' }}
  CLIPROXYAPI_VERSION: "7.2.61"

jobs:
  check:
    name: Check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install

      - name: Frontend checks (ts + lint + format)
        run: pnpm check:parallel

      - name: Rust check
        run: cargo check
        working-directory: src-tauri
        env:
          PROXYPAL_SKIP_SIDECAR: "1"
          ANTIGRAVITY_CLIENT_ID: ${{ secrets.ANTIGRAVITY_CLIENT_ID }}
          ANTIGRAVITY_CLIENT_SECRET: ${{ secrets.ANTIGRAVITY_CLIENT_SECRET }}

  build:
    name: Build (${{ matrix.platform }})
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS-ARM
            os: macos-latest
            target: aarch64-apple-darwin
            artifact_path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - platform: macOS-Intel
            os: macos-15-intel
            target: x86_64-apple-darwin
            artifact_path: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - platform: Linux
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_path: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
          - platform: Windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install

      - name: Download CLIProxyAPI sidecar binary
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -e
          mkdir -p src-tauri/binaries

          case "${{ matrix.target }}" in
            aarch64-apple-darwin)
              BINARY="cli-proxy-api-aarch64-apple-darwin"
              ;;
            x86_64-apple-darwin)
              BINARY="cli-proxy-api-x86_64-apple-darwin"
              ;;
            x86_64-unknown-linux-gnu)
              BINARY="cli-proxy-api-x86_64-unknown-linux-gnu"
              ;;
            x86_64-pc-windows-msvc)
              BINARY="cli-proxy-api-x86_64-pc-windows-msvc.exe"
              ;;
            *)
              echo "Unknown target: ${{ matrix.target }}"
              exit 1
              ;;
          esac

          echo "Downloading CLIProxyAPI sidecar channel '$CLIPROXYAPI_CHANNEL' for ${{ matrix.target }}..."
          node scripts/update-sidecar.mjs --channel "$CLIPROXYAPI_CHANNEL" --force "$BINARY"

          echo "Downloaded:"
          ls -la "$GITHUB_WORKSPACE/src-tauri/binaries/"

      - name: Build Tauri app
        shell: bash
        run: pnpm tauri build --target ${{ matrix.target }} --config '{"bundle":{"createUpdaterArtifacts":false}}'
        env:
          APPIMAGELAUNCHER_DISABLE: 1
          ANTIGRAVITY_CLIENT_ID: ${{ secrets.ANTIGRAVITY_CLIENT_ID }}
          ANTIGRAVITY_CLIENT_SECRET: ${{ secrets.ANTIGRAVITY_CLIENT_SECRET }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: proxypal-${{ matrix.target }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  notify:
    name: Discord Notification
    needs: [check, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Discord notification (success)
        if: ${{ needs.check.result == 'success' && needs.build.result == 'success' }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -H "Content-Type: application/json" \
            -d "{\"embeds\": [{\"title\": \"ProxyPal Build Passed\", \"description\": \"**Branch:** \`${{ github.ref_name }}\`\n**Commit:** [\`${GITHUB_SHA::7}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})\n**Author:** ${{ github.actor }}\n\n:package: Artifacts ready for download\", \"color\": 3066993}]}" \
            $DISCORD_WEBHOOK

      - name: Discord notification (failure)
        if: ${{ needs.check.result == 'failure' || needs.build.result == 'failure' }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -H "Content-Type: application/json" \
            -d "{\"embeds\": [{\"title\": \"ProxyPal Build Failed\", \"description\": \"**Branch:** \`${{ github.ref_name }}\`\n**Commit:** [\`${GITHUB_SHA::7}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})\n**Author:** ${{ github.actor }}\n\n[View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"color\": 15158332}]}" \
            $DISCORD_WEBHOOK
